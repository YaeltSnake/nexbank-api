spring.application.name=nexbank-api

spring.datasource.url=jdbc:postgresql://localhost:5432/nexbank_dev
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=banking
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=banking
spring.flyway.default-schema=banking

spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC